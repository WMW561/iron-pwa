<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Iron</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#dc2626;--red-glow:rgba(220,38,38,.25);--red-dark:#991b1b;
  --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
  --border:#2a2a2a;--border-light:#333;
  --text:#f5f5f5;--dim:#999;--muted:#666;
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);
  --yellow:#eab308;--blue:#3b82f6;
  --safe-b:env(safe-area-inset-bottom)
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:calc(80px + var(--safe-b));overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.hdr h1{font-size:22px;font-weight:900;color:var(--red);letter-spacing:-.5px}
.hdr .rt{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Recovery */
.recov{display:none;padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--border);font-size:12px;color:var(--dim);justify-content:space-between}
.recov.show{display:flex}
.recov .g{color:var(--green);font-weight:700}

/* Exercise Picker (Start State) */
.picker{padding:16px}
.picker-title{font-size:14px;color:var(--dim);margin-bottom:10px}
.recent-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.recent-btn{padding:8px 14px;border-radius:20px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500}
.recent-btn:active{background:var(--s3);border-color:var(--red)}
.add-row{display:flex;gap:8px}
.add-input{flex:1;height:44px;border-radius:12px;background:var(--s1);border:1px solid var(--border);color:var(--text);font-size:15px;padding:0 14px}
.add-input:focus{border-color:var(--red)}
.add-input::placeholder{color:var(--muted)}
.add-btn{width:44px;height:44px;border-radius:12px;background:var(--red);color:#fff;font-size:20px;font-weight:700}

/* Active Exercise Card */
.ex-card{display:none;padding:16px}
.ex-name{font-size:20px;font-weight:700;margin-bottom:2px}
.ex-last{font-size:12px;color:var(--muted);margin-bottom:12px;font-style:italic}

/* Set Rows */
.set-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.set-row.done{opacity:.6}
.set-row.current{background:var(--s1);margin:0 -16px;padding:10px 16px;border-radius:12px;border:1px solid var(--red);opacity:1}
.set-label{width:48px;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600}
.set-label.done-label{color:var(--green)}
.w-input,.r-input{width:72px;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:17px;font-weight:600;text-align:center;-webkit-appearance:none}
.w-input:focus,.r-input:focus{border-color:var(--red);background:var(--s3)}
.x-label{font-size:15px;color:var(--muted);font-weight:600}
.set-check{width:40px;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center}
.set-check.checked{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.set-type{font-size:10px;color:var(--muted);padding:2px 6px;border-radius:4px;border:1px solid var(--border);margin-left:auto}
.set-type.warmup{color:var(--yellow);border-color:var(--yellow)}
.set-type.failure{color:var(--red);border-color:var(--red)}

/* Add set + actions */
.ex-actions{display:flex;gap:8px;padding:12px 0}
.act-btn{flex:1;height:38px;border-radius:10px;background:var(--s1);border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600}
.act-btn:active{background:var(--s2)}
.act-btn.primary{border-color:var(--green);color:var(--green)}

/* Rest Timer */
.rest-bar{display:none;padding:12px 16px;background:var(--s1);border-top:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center}
.rest-bar.show{display:block}
.rest-time{font-size:28px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums}
.rest-label{font-size:11px;color:var(--muted);margin-top:2px}

/* Workout Log (completed exercises) */
.log{padding:0 16px}
.log h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:12px 0 6px}
.log-item{display:flex;flex-direction:column;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.log-name{font-weight:600}
.log-sets{color:var(--dim)}
.log-actions{display:none;gap:8px;margin-top:6px}
.log-item.expanded .log-actions{display:flex}
.log-act{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600}
.log-act.edit{background:var(--s2);border:1px solid var(--blue);color:var(--blue)}
.log-act.del{background:var(--s2);border:1px solid var(--red);color:var(--red)}

/* Edit modal */
.edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:95;overflow-y:auto;padding:20px}
.edit-modal.show{display:flex;align-items:flex-start;justify-content:center}
.edit-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;width:100%;max-width:400px;margin-top:30px}
.edit-box h3{font-size:16px;font-weight:700;margin-bottom:14px}
.edit-set-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.edit-set-row span{font-size:12px;color:var(--muted);width:40px}
.edit-set-row input{width:70px;height:36px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600;text-align:center}
.edit-set-row input:focus{border-color:var(--red)}
.edit-set-row .x-label{font-size:14px;color:var(--muted)}
.edit-btns{display:flex;gap:8px;margin-top:14px}
.edit-btns button{flex:1;height:42px;border-radius:10px;font-size:13px;font-weight:700}
.edit-save{background:var(--green-bg);border:1px solid var(--green);color:var(--green)}
.edit-cancel{background:var(--s2);border:1px solid var(--border);color:var(--dim)}

/* Recent exercise delete */
.recent-btn{position:relative}
.recent-del{display:none;position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;line-height:20px;text-align:center}
.picker.edit-mode .recent-del{display:block}

/* Bottom Bar */
.bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px calc(12px + var(--safe-b));display:flex;gap:8px}
.bot-btn{flex:1;height:50px;border-radius:14px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.bot-btn.next{background:var(--s1);border:1px solid var(--blue);color:var(--blue)}
.bot-btn.finish{background:var(--s1);border:1px solid var(--green);color:var(--green)}
.bot-btn.start{background:var(--red);color:#fff;border:none;width:100%}
.bot-btn:active{transform:scale(.97)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;overflow-y:auto;padding:20px}
.modal-bg.show{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:400px;margin-top:30px}
.modal h2{font-size:18px;font-weight:900;color:var(--red);margin-bottom:16px}
.modal .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.modal .lbl{color:var(--dim)}.modal .val{font-weight:600}
.modal .close{width:100%;height:48px;border-radius:12px;background:var(--red);color:#fff;font-size:15px;font-weight:700;margin-top:16px}

/* Voice overlay removed — iOS PWA blocks Web Speech API */
</style>
</head>
<body>

<div class="hdr">
  <h1>IRON</h1>
  <div class="rt"><span class="dot"></span><span id="timer">00:00</span></div>
</div>

<!-- Recovery banner — hidden until Whoop API is connected -->
<div class="recov" id="recov"><span>Recovery</span><span class="g" id="recovScore"></span></div>

<div class="rest-bar" id="restBar">
  <div class="rest-time" id="restTime">1:30</div>
  <div class="rest-label">REST</div>
</div>

<!-- Exercise picker (shown when no active exercise) -->
<div id="pickerView" class="picker">
  <div style="display:flex;justify-content:space-between;align-items:center">
  <div class="picker-title">RECENT EXERCISES</div>
  <button style="font-size:11px;color:var(--muted);background:none;padding:4px 8px" onclick="toggleEditRecent()" id="editRecentBtn">Edit</button>
</div>
  <div class="recent-grid" id="recentGrid"></div>
  <div class="picker-title" style="margin-top:8px">ADD EXERCISE</div>
  <div class="add-row">
    <input class="add-input" id="exInput" placeholder="Exercise name..." enterkeyhint="next">
    <button class="add-btn" id="exAddBtn">+</button>
  </div>
</div>

<!-- Active exercise (shown when logging) -->
<div id="exCard" class="ex-card">
  <div class="ex-name" id="exName"></div>
  <div class="ex-last" id="exLast"></div>
  <div id="setRows"></div>
  <div class="ex-actions">
    <button class="act-btn" onclick="addSetRow()">+ Set</button>
    <button class="act-btn" onclick="toggleType()">Type</button>
    <button class="act-btn primary" onclick="finishExercise()">Done ✓</button>
  </div>
</div>

<!-- Completed exercises log -->
<div class="log" id="logView"></div>

<!-- Bottom bar -->
<div class="bottom" id="bottomBar">
  <button class="bot-btn start" id="startBtn" onclick="startWorkout()">START WORKOUT</button>
</div>

<!-- Summary modal -->
<div class="modal-bg" id="summaryModal">
  <div class="modal">
    <h2>WORKOUT COMPLETE</h2>
    <div id="summaryBody"></div>
    <button class="close" onclick="closeSummary()">DONE</button>
    <button style="width:100%;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600;margin-top:8px" onclick="exportData()">Export All Data (JSON)</button>
  </div>
</div>

<!-- Edit exercise modal -->
<div class="edit-modal" id="editModal">
  <div class="edit-box">
    <h3 id="editTitle">Edit Exercise</h3>
    <div id="editSets"></div>
    <div class="edit-btns">
      <button class="edit-cancel" onclick="closeEdit()">Cancel</button>
      <button class="edit-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Voice overlay removed — iOS PWA blocks Web Speech API. Using speed-first manual input instead. -->

<script>
// ===================== STATE =====================
let W = { active:false, start:null, exercises:[], cur:null, sets:[], setIdx:0, targetSets:3 };
const LS = k => { try{return JSON.parse(localStorage.getItem(k))}catch(e){return null} };
const SS = (k,v) => localStorage.setItem(k, JSON.stringify(v));
let history = LS('iron_history') || {};
let recentEx = LS('iron_recent') || [];
let restInterval = null;

// Restore active workout
const saved = LS('iron_active');
if(saved && saved.active){ W=saved; W.start=new Date(saved.start); restoreUI() }
else { showPicker() }

// ===================== PLATE MATH =====================
function calcWeight(s){
  s = s.trim().toLowerCase();
  // Direct number
  let m = s.match(/^(\d+\.?\d*)\s*(lbs?|pounds?)?$/);
  if(m) return {total:parseFloat(m[1]), desc:m[1]+' lbs'};
  // Dumbbell
  m = s.match(/(\d+\.?\d*)\s*(lb|pound)?\s*(dumbbe?lls?|dbs?)/);
  if(m) return {total:parseFloat(m[1]), desc:m[1]+' lb DBs', db:true};
  // Plate math
  const nums={a:1,one:1,two:2,three:3,four:4,five:5,six:6};
  const names={plate:45,quarter:25,dime:10,nickel:5};
  let per=0, found=false;
  const re=/(\w+)\s+(45|35|25|10|5|2\.5)s?|(\w+)\s+(plates?|quarters?|dimes?|nickels?)/gi;
  let x;
  while((x=re.exec(s))!==null){
    found=true;
    if(x[1]&&x[2]){per+=(nums[x[1]]||parseInt(x[1])||1)*parseFloat(x[2])}
    else if(x[3]&&x[4]){per+=(nums[x[3]]||parseInt(x[3])||1)*(names[x[4].replace(/s$/,'')]||0)}
  }
  if(found&&per>0){const t=45+per*2;return{total:t,desc:t+' lbs ('+s+')'}}
  if(s.includes('bar')||s==='bar')return{total:45,desc:'45 lbs (bar)'};
  return null;
}

// ===================== WORKOUT LIFECYCLE =====================
function startWorkout(){
  W.active=true; W.start=new Date(); W.exercises=[]; W.cur=null; W.sets=[]; W.setIdx=0;
  save(); startTimer(); showPicker();
  document.getElementById('bottomBar').innerHTML=`
    <button class="bot-btn next" onclick="showPicker()">+ Exercise</button>
    <button class="bot-btn finish" onclick="endWorkout()">Finish</button>`;
}

function discardWorkout(){
  if(!confirm('Discard this workout? All data will be lost.')) return;
  localStorage.removeItem('iron_active');
  W={active:false,start:null,exercises:[],cur:null,sets:[],setIdx:0,targetSets:3};
  document.getElementById('exCard').style.display='none';
  document.getElementById('logView').innerHTML='';
  document.getElementById('timer').textContent='00:00';
  clearRest();
  if(timerInt)clearInterval(timerInt);
  document.getElementById('bottomBar').innerHTML=`<button class="bot-btn start" onclick="startWorkout()">START WORKOUT</button>`;
  showPicker();
}

function endWorkout(){
  if(W.cur) finishExercise();
  showSummary();
}

function save(){ SS('iron_active', W) }

// ===================== EXERCISE MANAGEMENT =====================
function selectExercise(name, weightStr){
  if(W.cur) finishExercise();

  const h = history[name.toLowerCase()];
  const lastW = h ? h.weight : '';
  const lastSets = h ? h.sets : [];

  W.cur = name;
  W.sets = [];
  W.setIdx = 0;
  W.targetSets = (h && h.sets.length) ? h.sets.length : 3;

  document.getElementById('pickerView').style.display='none';
  const card = document.getElementById('exCard');
  card.style.display='block';
  document.getElementById('exName').textContent = name;
  document.getElementById('exLast').textContent = h ?
    'Last: '+h.desc+' × '+h.sets.join(', ')+' ('+h.date+')' : 'First time';

  // Build set rows
  const container = document.getElementById('setRows');
  container.innerHTML='';
  for(let i=0;i<W.targetSets;i++){
    const row = document.createElement('div');
    row.className = 'set-row' + (i===0?' current':'');
    row.id = 'setRow'+i;
    const sugW = lastSets.length>i && h ? h.weight : (lastW||'');
    const sugR = lastSets.length>i ? lastSets[i] : '';
    row.innerHTML=`
      <span class="set-label" id="sLbl${i}">Set ${i+1}</span>
      <input class="w-input" id="sW${i}" type="number" inputmode="decimal" placeholder="lbs" value="${sugW}" onfocus="this.select()">
      <span class="x-label">×</span>
      <input class="r-input" id="sR${i}" type="number" inputmode="numeric" placeholder="reps" value="${sugR}" onfocus="this.select()">
      <button class="set-check" id="sC${i}" onclick="logSet(${i})">✓</button>`;
    container.appendChild(row);
  }
  // Focus first empty reps field
  setTimeout(()=>{
    const f=document.getElementById('sR0');
    if(f&&!f.value)f.focus();
    else{const w=document.getElementById('sW0');if(w&&!w.value)w.focus()}
  },100);
  save();
}

function logSet(idx){
  const wEl=document.getElementById('sW'+idx);
  const rEl=document.getElementById('sR'+idx);
  const w=parseFloat(wEl.value);
  const r=parseInt(rEl.value);
  if(!w||!r)return;

  W.sets.push({weight:w, reps:r});
  W.setIdx=idx+1;

  // Mark done
  const row=document.getElementById('setRow'+idx);
  row.classList.remove('current');
  row.classList.add('done');
  document.getElementById('sLbl'+idx).classList.add('done-label');
  document.getElementById('sLbl'+idx).textContent='✓ Set '+(idx+1);
  document.getElementById('sC'+idx).classList.add('checked');
  wEl.readOnly=true; rEl.readOnly=true;
  wEl.style.opacity='.5'; rEl.style.opacity='.5';

  // Vibrate
  if(navigator.vibrate) navigator.vibrate(50);

  // Auto-fill next set weight
  if(idx+1 < W.targetSets){
    const nextW=document.getElementById('sW'+(idx+1));
    if(nextW&&!nextW.value) nextW.value=w;
    const nextRow=document.getElementById('setRow'+(idx+1));
    if(nextRow) nextRow.classList.add('current');
    setTimeout(()=>{
      const nextR=document.getElementById('sR'+(idx+1));
      if(nextR) nextR.focus();
    },100);
  }

  // Start rest timer (keep running even on last set — user may need rest before next exercise)
  startRest(90);
  save();
}

function finishExercise(){
  if(!W.cur||W.sets.length===0)return;
  const name=W.cur;
  const mainWeight = W.sets[0].weight;
  const reps = W.sets.map(s=>s.reps);
  const desc = mainWeight+' lbs';

  W.exercises.push({name, weight:mainWeight, desc, sets:W.sets.map(s=>s.reps), allSets:W.sets});

  // Save to history
  history[name.toLowerCase()]={weight:mainWeight, desc, sets:reps, date:new Date().toISOString().split('T')[0]};
  SS('iron_history', history);

  // Update recent
  recentEx = [name, ...recentEx.filter(e=>e.toLowerCase()!==name.toLowerCase())].slice(0,8);
  SS('iron_recent', recentEx);

  W.cur=null; W.sets=[]; W.setIdx=0;
  document.getElementById('exCard').style.display='none';
  clearRest();
  updateLog();
  save();
}

function addSetRow(){
  W.targetSets++;
  const i=W.targetSets-1;
  const container=document.getElementById('setRows');
  const lastW = W.sets.length>0 ? W.sets[W.sets.length-1].weight : '';
  const row=document.createElement('div');
  row.className='set-row'+(W.setIdx===i?' current':'');
  row.id='setRow'+i;
  row.innerHTML=`
    <span class="set-label" id="sLbl${i}">Set ${i+1}</span>
    <input class="w-input" id="sW${i}" type="number" inputmode="decimal" placeholder="lbs" value="${lastW}" onfocus="this.select()">
    <span class="x-label">×</span>
    <input class="r-input" id="sR${i}" type="number" inputmode="numeric" placeholder="reps" onfocus="this.select()">
    <button class="set-check" id="sC${i}" onclick="logSet(${i})">✓</button>`;
  container.appendChild(row);
}

function toggleType(){
  // Cycle current set row between warmup/working/failure
  const idx = W.setIdx;
  if(idx >= W.targetSets) return;
  const lbl = document.getElementById('sLbl'+idx);
  if(!lbl) return;
  const types = ['Set '+(idx+1), 'Warm', 'Fail'];
  const classes = ['', 'warmup', 'failure'];
  const cur = lbl.dataset.typeIdx ? parseInt(lbl.dataset.typeIdx) : 0;
  const next = (cur+1)%3;
  lbl.textContent = types[next];
  lbl.dataset.typeIdx = next;
  lbl.className = 'set-label' + (classes[next] ? ' set-type '+classes[next] : '');
}

// ===================== EXERCISE PICKER =====================
function showPicker(){
  document.getElementById('exCard').style.display='none';
  const p=document.getElementById('pickerView');
  p.style.display='block';
  const grid=document.getElementById('recentGrid');
  grid.innerHTML='';
  recentEx.forEach(name=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:relative;display:inline-block';
    const btn=document.createElement('button');
    btn.className='recent-btn';
    btn.textContent=name;
    const h=history[name.toLowerCase()];
    if(h) btn.textContent=name+' · '+h.weight;
    btn.onclick=()=>{
      const picker=document.getElementById('pickerView');
      if(picker.classList.contains('edit-mode')) editRecent(name);
      else selectExercise(name);
    };
    const del=document.createElement('span');
    del.className='recent-del';
    del.textContent='×';
    del.onclick=(e)=>{e.stopPropagation();deleteRecent(name)};
    wrap.appendChild(btn);
    wrap.appendChild(del);
    grid.appendChild(wrap);
  });
  if(recentEx.length===0){
    grid.innerHTML='<span style="color:var(--muted);font-size:13px">No exercises yet. Add one below.</span>';
  }
  document.getElementById('exInput').value='';
  setTimeout(()=>document.getElementById('exInput').focus(),100);
}

// Add exercise via input
document.getElementById('exAddBtn').onclick=addFromInput;
document.getElementById('exInput').addEventListener('keydown',e=>{if(e.key==='Enter')addFromInput()});
function addFromInput(){
  const input=document.getElementById('exInput');
  let val=input.value.trim();
  if(!val)return;
  val=val.replace(/\b\w/g,c=>c.toUpperCase());
  // Auto-start workout if not active
  if(!W.active) startWorkout();
  selectExercise(val);
  input.value='';
}

// ===================== REST TIMER (from Strong) =====================
function startRest(secs){
  clearRest();
  let rem=secs;
  const bar=document.getElementById('restBar');
  bar.classList.add('show');
  updateRestDisplay(rem);
  restInterval=setInterval(()=>{
    rem--;
    if(rem<=0){clearRest();if(navigator.vibrate)navigator.vibrate([100,50,100])}
    else updateRestDisplay(rem);
  },1000);
}
function clearRest(){
  if(restInterval)clearInterval(restInterval);
  restInterval=null;
  document.getElementById('restBar').classList.remove('show');
}
function updateRestDisplay(s){
  const m=Math.floor(s/60);
  const sec=(s%60).toString().padStart(2,'0');
  document.getElementById('restTime').textContent=m+':'+sec;
}

// ===================== WORKOUT LOG =====================
function updateLog(){
  const v=document.getElementById('logView');
  if(W.exercises.length===0){v.innerHTML='';return}
  let html='<h3>Completed</h3>';
  W.exercises.forEach((ex,idx)=>{
    const sStr=ex.allSets.map(s=>s.weight+'×'+s.reps).join(', ');
    html+=`<div class="log-item" onclick="toggleLogItem(${idx})">
      <div style="display:flex;justify-content:space-between"><span class="log-name">${ex.name}</span><span class="log-sets">${sStr}</span></div>
      <div class="log-actions">
        <button class="log-act edit" onclick="event.stopPropagation();editExercise(${idx})">Edit</button>
        <button class="log-act del" onclick="event.stopPropagation();deleteExercise(${idx})">Delete</button>
      </div>
    </div>`;
  });
  v.innerHTML=html;
}

// ===================== SUMMARY (from Hevy) =====================
function showSummary(){
  const dur=Math.floor((new Date()-W.start)/60000);
  const totalSets=W.exercises.reduce((s,e)=>s+e.sets.length,0);
  const totalVol=W.exercises.reduce((s,e)=>s+e.allSets.reduce((a,set)=>a+set.weight*set.reps,0),0);
  let html='';
  html+=`<div class="row"><span class="lbl">Duration</span><span class="val">${dur} min</span></div>`;
  html+=`<div class="row"><span class="lbl">Exercises</span><span class="val">${W.exercises.length}</span></div>`;
  html+=`<div class="row"><span class="lbl">Total Sets</span><span class="val">${totalSets}</span></div>`;
  html+=`<div class="row"><span class="lbl">Volume</span><span class="val">${totalVol.toLocaleString()} lbs</span></div>`;
  html+='<div style="height:12px"></div>';
  W.exercises.forEach(ex=>{
    const sStr=ex.allSets.map(s=>s.weight+'×'+s.reps).join(', ');
    // Check progressive overload (volume: weight × reps × sets)
    const h=history[ex.name.toLowerCase()];
    let note='';
    if(h){
      const prevVol=h.weight * h.sets.reduce((a,r)=>a+r,0);
      const curVol=ex.allSets.reduce((a,s)=>a+s.weight*s.reps,0);
      if(curVol>prevVol) note=' ↑';
      else if(curVol<prevVol) note=' ↓';
    }
    html+=`<div class="row"><span class="lbl">${ex.name}${note}</span><span class="val">${sStr}</span></div>`;
  });
  document.getElementById('summaryBody').innerHTML=html;
  document.getElementById('summaryModal').classList.add('show');

  // Save completed workout
  const done=LS('iron_completed')||[];
  done.push({date:W.start.toISOString(),dur,exercises:W.exercises,volume:totalVol});
  SS('iron_completed',done);
  localStorage.removeItem('iron_active');
}
function closeSummary(){
  document.getElementById('summaryModal').classList.remove('show');
  W={active:false,start:null,exercises:[],cur:null,sets:[],setIdx:0,targetSets:3};
  document.getElementById('logView').innerHTML='';
  document.getElementById('timer').textContent='00:00';
  document.getElementById('bottomBar').innerHTML=`<button class="bot-btn start" onclick="startWorkout()">START WORKOUT</button>`;
  showPicker();
}

// ===================== EDIT & DELETE =====================
let editIdx = -1;

function toggleLogItem(idx){
  const items = document.querySelectorAll('.log-item');
  items.forEach((item,i)=>{
    if(i===idx) item.classList.toggle('expanded');
    else item.classList.remove('expanded');
  });
}

function editExercise(idx){
  editIdx = idx;
  const ex = W.exercises[idx];
  document.getElementById('editTitle').textContent = 'Edit Exercise';
  const container = document.getElementById('editSets');
  container.innerHTML=`<div class="edit-set-row" style="border-bottom:2px solid var(--border);padding-bottom:12px;margin-bottom:4px">
    <span style="width:auto;color:var(--dim);font-size:12px">Name</span>
    <input type="text" id="eNameInput" value="${ex.name}" style="width:100%;flex:1;text-align:left;font-size:15px;padding:0 10px">
  </div>`;
  ex.allSets.forEach((s,i)=>{
    const row = document.createElement('div');
    row.className='edit-set-row';
    row.innerHTML=`
      <span>Set ${i+1}</span>
      <input type="number" inputmode="decimal" id="eW${i}" value="${s.weight}">
      <span class="x-label">×</span>
      <input type="number" inputmode="numeric" id="eR${i}" value="${s.reps}">`;
    container.appendChild(row);
  });
  document.getElementById('editModal').classList.add('show');
}

function saveEdit(){
  if(editIdx<0) return;
  const ex = W.exercises[editIdx];
  const oldName = ex.name;

  // Update name
  const newName = document.getElementById('eNameInput').value.trim();
  if(newName) ex.name = newName;

  // Update sets
  ex.allSets.forEach((s,i)=>{
    const w = parseFloat(document.getElementById('eW'+i).value);
    const r = parseInt(document.getElementById('eR'+i).value);
    if(w) s.weight=w;
    if(r) { s.reps=r; ex.sets[i]=r; }
  });
  ex.weight = ex.allSets[0].weight;
  ex.desc = ex.weight+' lbs';

  // Update history (remove old name if renamed)
  if(oldName.toLowerCase()!==ex.name.toLowerCase()){
    delete history[oldName.toLowerCase()];
    recentEx = recentEx.map(e=>e.toLowerCase()===oldName.toLowerCase()?ex.name:e);
    SS('iron_recent', recentEx);
  }
  history[ex.name.toLowerCase()]={weight:ex.weight, desc:ex.desc, sets:ex.sets, date:new Date().toISOString().split('T')[0]};
  SS('iron_history', history);

  closeEdit();
  updateLog();
  save();
}

function closeEdit(){
  editIdx=-1;
  document.getElementById('editModal').classList.remove('show');
}

function deleteExercise(idx){
  if(!confirm('Delete '+W.exercises[idx].name+'?')) return;
  W.exercises.splice(idx,1);
  updateLog();
  save();
}

function toggleEditRecent(){
  const picker = document.getElementById('pickerView');
  picker.classList.toggle('edit-mode');
  const btn = document.getElementById('editRecentBtn');
  btn.textContent = picker.classList.contains('edit-mode') ? 'Done' : 'Edit';
}

function deleteRecent(name){
  recentEx = recentEx.filter(e=>e.toLowerCase()!==name.toLowerCase());
  SS('iron_recent', recentEx);
  showPicker();
}

function editRecent(oldName){
  const newName = prompt('Rename exercise:', oldName);
  if(!newName || !newName.trim() || newName.trim()===oldName) return;
  const cleaned = newName.trim().replace(/\b\w/g,c=>c.toUpperCase());

  // Update recent list
  recentEx = recentEx.map(e=>e.toLowerCase()===oldName.toLowerCase()?cleaned:e);
  SS('iron_recent', recentEx);

  // Update history
  if(history[oldName.toLowerCase()]){
    history[cleaned.toLowerCase()] = history[oldName.toLowerCase()];
    delete history[oldName.toLowerCase()];
    SS('iron_history', history);
  }

  showPicker();
}

// ===================== DATA EXPORT =====================
function exportData(){
  const data={
    history: LS('iron_history')||{},
    recent: LS('iron_recent')||[],
    completed: LS('iron_completed')||[]
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='iron-workout-data-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ===================== TIMER =====================
let timerInt=null;
function startTimer(){
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!W.start)return;
    const s=Math.floor((new Date()-new Date(W.start))/1000);
    const m=Math.floor(s/60).toString().padStart(2,'0');
    const sec=(s%60).toString().padStart(2,'0');
    document.getElementById('timer').textContent=m+':'+sec;
  },1000);
}

// ===================== RESTORE UI =====================
function restoreUI(){
  startTimer();
  document.getElementById('bottomBar').innerHTML=`
    <button class="bot-btn next" onclick="showPicker()">+ Exercise</button>
    <button class="bot-btn finish" onclick="endWorkout()">Finish</button>
    <button style="position:absolute;top:-30px;right:16px;font-size:11px;color:var(--muted);background:none" onclick="discardWorkout()">Discard</button>`;
  updateLog();
  if(W.cur) selectExercise(W.cur);
  else showPicker();
}

// ===================== SERVICE WORKER =====================
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
