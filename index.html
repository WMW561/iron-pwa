<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Iron</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#dc2626;--red-glow:rgba(220,38,38,.25);--red-dark:#991b1b;
  --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
  --border:#2a2a2a;--border-light:#333;
  --text:#f5f5f5;--dim:#999;--muted:#666;
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);
  --yellow:#eab308;--blue:#3b82f6;
  --safe-b:env(safe-area-inset-bottom)
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:calc(80px + var(--safe-b));overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.hdr h1{font-size:22px;font-weight:900;color:var(--red);letter-spacing:-.5px}
.hdr .rt{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Recovery */
.recov{display:none;padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--border);font-size:12px;color:var(--dim);justify-content:space-between}
.recov.show{display:flex}
.recov .g{color:var(--green);font-weight:700}

/* Exercise Picker (Start State) */
.picker{padding:16px}
.picker-title{font-size:14px;color:var(--dim);margin-bottom:10px}
.recent-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.recent-btn{padding:8px 14px;border-radius:20px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500}
.recent-btn:active{background:var(--s3);border-color:var(--red)}
.add-row{display:flex;gap:8px}
.add-input{flex:1;height:44px;border-radius:12px;background:var(--s1);border:1px solid var(--border);color:var(--text);font-size:15px;padding:0 14px}
.add-input:focus{border-color:var(--red)}
.add-input::placeholder{color:var(--muted)}
.add-btn{width:44px;height:44px;border-radius:12px;background:var(--red);color:#fff;font-size:20px;font-weight:700}

/* Active Exercise Card */
.ex-card{display:none;padding:16px}
.ex-name{font-size:20px;font-weight:700;margin-bottom:2px}
.ex-last{font-size:12px;color:var(--muted);margin-bottom:12px;font-style:italic}

/* Set Rows */
.set-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.set-row.done{opacity:.6}
.set-row.current{background:var(--s1);margin:0 -16px;padding:10px 16px;border-radius:12px;border:1px solid var(--red);opacity:1}
.set-label{width:48px;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600}
.set-label.done-label{color:var(--green)}
.w-input,.r-input{width:72px;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:17px;font-weight:600;text-align:center;-webkit-appearance:none}
.w-input:focus,.r-input:focus{border-color:var(--red);background:var(--s3)}
.x-label{font-size:15px;color:var(--muted);font-weight:600}
.set-check{width:40px;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center}
.set-check.checked{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.set-type{font-size:10px;color:var(--muted);padding:2px 6px;border-radius:4px;border:1px solid var(--border);margin-left:auto}
.set-type.warmup{color:var(--yellow);border-color:var(--yellow)}
.set-type.failure{color:var(--red);border-color:var(--red)}

/* Add set + actions */
.ex-actions{display:flex;gap:8px;padding:12px 0}
.act-btn{flex:1;height:38px;border-radius:10px;background:var(--s1);border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600}
.act-btn:active{background:var(--s2)}
.act-btn.primary{border-color:var(--green);color:var(--green)}

/* Rest Timer — see fixed-position version below */
.rest-time{font-size:28px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums}
.rest-label{font-size:11px;color:var(--muted);margin-top:2px}

/* Workout Log (completed exercises) */
.log{padding:0 16px}
.log h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:12px 0 6px}
.log-item{display:flex;flex-direction:column;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.log-name{font-weight:600}
.log-sets{color:var(--dim)}
.log-actions{display:none;gap:8px;margin-top:6px}
.log-item.expanded .log-actions{display:flex}
.log-act{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600}
.log-act.edit{background:var(--s2);border:1px solid var(--blue);color:var(--blue)}
.log-act.del{background:var(--s2);border:1px solid var(--red);color:var(--red)}

/* Edit modal */
.edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:95;overflow-y:auto;padding:20px}
.edit-modal.show{display:flex;align-items:flex-start;justify-content:center}
.edit-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;width:100%;max-width:400px;margin-top:30px}
.edit-box h3{font-size:16px;font-weight:700;margin-bottom:14px}
.edit-set-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.edit-set-row span{font-size:12px;color:var(--muted);width:40px}
.edit-set-row input{width:70px;height:36px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600;text-align:center}
.edit-set-row input:focus{border-color:var(--red)}
.edit-set-row .x-label{font-size:14px;color:var(--muted)}
.edit-btns{display:flex;gap:8px;margin-top:14px}
.edit-btns button{flex:1;height:42px;border-radius:10px;font-size:13px;font-weight:700}
.edit-save{background:var(--green-bg);border:1px solid var(--green);color:var(--green)}
.edit-cancel{background:var(--s2);border:1px solid var(--border);color:var(--dim)}

/* Recent exercise delete */
.recent-btn{position:relative}
.recent-del{display:none;position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;line-height:20px;text-align:center}
.picker.edit-mode .recent-del{display:block}

/* Bottom Bar */
.bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px calc(12px + var(--safe-b));display:flex;gap:8px}
.bot-btn{flex:1;height:50px;border-radius:14px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.bot-btn.next{background:var(--s1);border:1px solid var(--blue);color:var(--blue)}
.bot-btn.finish{background:var(--s1);border:1px solid var(--green);color:var(--green)}
.bot-btn.start{background:var(--red);color:#fff;border:none;width:100%}
.bot-btn:active{transform:scale(.97)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;overflow-y:auto;padding:20px}
.modal-bg.show{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:400px;margin-top:30px}
.modal h2{font-size:18px;font-weight:900;color:var(--red);margin-bottom:16px}
.modal .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.modal .lbl{color:var(--dim)}.modal .val{font-weight:600}
.modal .close{width:100%;height:48px;border-radius:12px;background:var(--red);color:#fff;font-size:15px;font-weight:700;margin-top:16px}

/* Voice overlay removed — iOS PWA blocks Web Speech API */

/* Custom Dialog */
.dialog-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px}
.dialog-bg.show{display:flex}
.dialog-box{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:320px;text-align:center}
.dialog-box .msg{font-size:15px;color:var(--text);margin-bottom:16px;line-height:1.4}
.dialog-btns{display:flex;gap:8px}
.dialog-btns button{flex:1;height:44px;border-radius:10px;font-size:14px;font-weight:700}
.dialog-cancel{background:var(--s2);border:1px solid var(--border);color:var(--dim)}
.dialog-ok{background:var(--red);border:none;color:#fff}
.dialog-ok.green{background:var(--green-bg);border:1px solid var(--green);color:var(--green)}

/* Muscle Group Prompt */
.group-prompt{display:none;padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--border)}
.group-prompt.show{display:block}
.group-prompt .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.group-prompt .pills{display:flex;flex-wrap:wrap;gap:6px}
.group-prompt .pill{padding:6px 12px;border-radius:16px;background:var(--s2);border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600}
.group-prompt .pill:active{border-color:var(--red);color:var(--text)}

/* Weekly Stats */
.week-stats{padding:8px 16px;font-size:12px;color:var(--dim);text-align:center;border-bottom:1px solid var(--border)}
.week-stats .num{color:var(--text);font-weight:700}

/* Rest Timer — fixed position to prevent layout shift */
.rest-bar{display:none;position:fixed;top:49px;left:0;right:0;z-index:50;padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--border);text-align:center}
.rest-bar.show{display:block}
</style>
</head>
<body>

<div class="hdr">
  <h1>IRON</h1>
  <div class="rt">
    <button style="background:none;color:var(--dim);font-size:12px;font-weight:600;padding:4px 8px;border:1px solid var(--border);border-radius:6px" onclick="showHistory()">History</button>
    <span class="dot"></span><span id="timer">00:00</span>
  </div>
</div>

<!-- Recovery banner — hidden until Whoop API is connected -->
<div class="recov" id="recov"><span>Recovery</span><span class="g" id="recovScore"></span></div>

<div class="rest-bar" id="restBar" onclick="cycleRestTime()">
  <div class="rest-time" id="restTime">1:30</div>
  <div class="rest-label">REST (tap to change)</div>
</div>

<!-- Weekly Stats Banner -->
<div class="week-stats" id="weekStats" style="display:none"></div>

<!-- Workout Focus Selector -->
<div id="planView" class="picker">
  <div class="picker-title">WHAT ARE YOU HITTING TODAY?</div>
  <div id="planGrid" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"></div>
  <button style="width:100%;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600" onclick="skipPlan()">Free Workout</button>
</div>

<!-- Exercise picker (shown when no active exercise) -->
<div id="pickerView" class="picker" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center">
  <div class="picker-title">RECENT EXERCISES</div>
  <button style="font-size:11px;color:var(--muted);background:none;padding:4px 8px" onclick="toggleEditRecent()" id="editRecentBtn">Edit</button>
</div>
  <div class="recent-grid" id="recentGrid"></div>
  <div class="picker-title" style="margin-top:8px">ADD EXERCISE</div>
  <div class="add-row">
    <input class="add-input" id="exInput" placeholder="Exercise name..." enterkeyhint="next">
    <button class="add-btn" id="exAddBtn">+</button>
  </div>
</div>

<!-- Active exercise (shown when logging) -->
<div id="exCard" class="ex-card">
  <div class="ex-name" id="exName"></div>
  <div class="ex-last" id="exLast"></div>
  <div id="setRows"></div>
  <div class="ex-actions">
    <button class="act-btn" onclick="addSetRow()">+ Set</button>
    <button class="act-btn" onclick="toggleType()">Type</button>
    <button class="act-btn primary" onclick="finishExercise()">Next Exercise</button>
  </div>
</div>

<!-- Completed exercises log -->
<div class="log" id="logView"></div>

<!-- Bottom bar -->
<div class="bottom" id="bottomBar"></div>

<!-- Workout History Panel -->
<div class="modal-bg" id="historyModal">
  <div class="modal" style="max-height:80vh;overflow-y:auto">
    <h2 style="color:var(--blue)">WORKOUT HISTORY</h2>
    <div id="historyBody"></div>
    <button class="close" style="background:var(--s2);color:var(--dim);border:1px solid var(--border)" onclick="document.getElementById('historyModal').classList.remove('show')">Close</button>
    <button style="width:100%;height:38px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;margin-top:8px" onclick="exportData()">Export All Data</button>
  </div>
</div>

<!-- Summary modal -->
<div class="modal-bg" id="summaryModal">
  <div class="modal">
    <h2>WORKOUT SUMMARY</h2>
    <div id="summaryBody"></div>
    <button class="close" onclick="submitWorkout()">SAVE WORKOUT</button>
    <button style="width:100%;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600;margin-top:8px" onclick="closeSummary()">Back to Edit</button>
    <button style="width:100%;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;margin-top:8px" onclick="exportData()">Export All Data (JSON)</button>
  </div>
</div>

<!-- Edit exercise modal -->
<div class="edit-modal" id="editModal">
  <div class="edit-box">
    <h3 id="editTitle">Edit Exercise</h3>
    <div id="editSets"></div>
    <div class="edit-btns">
      <button class="edit-cancel" onclick="closeEdit()">Cancel</button>
      <button class="edit-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Voice overlay removed — iOS PWA blocks Web Speech API. Using speed-first manual input instead. -->

<!-- Custom Dialog Modal -->
<div class="dialog-bg" id="dialogModal">
  <div class="dialog-box">
    <div class="msg" id="dialogMsg"></div>
    <div id="dialogInput" style="display:none;margin-bottom:12px">
      <input type="text" id="dialogInputField" style="width:100%;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:15px;padding:0 14px;text-align:center">
    </div>
    <div class="dialog-btns">
      <button class="dialog-cancel" id="dialogCancel" onclick="resolveDialog(false)">Cancel</button>
      <button class="dialog-ok" id="dialogOk" onclick="resolveDialog(true)">OK</button>
    </div>
  </div>
</div>

<!-- Muscle Group Prompt (Free Workout) -->
<div class="group-prompt" id="groupPrompt">
  <div class="label">WHAT MUSCLE GROUP?</div>
  <div class="pills" id="groupPills"></div>
</div>

<script>
// ===================== STATE =====================
let W = { active:false, start:null, exercises:[], cur:null, sets:[], setIdx:0, targetSets:3 };
const LS = k => { try{return JSON.parse(localStorage.getItem(k))}catch(e){return null} };
const SS = (k,v) => localStorage.setItem(k, JSON.stringify(v));
let history = LS('iron_history') || {};
let recentEx = LS('iron_recent') || [];
let restInterval = null;

// ===================== CUSTOM DIALOG =====================
let _dialogResolve = null;
function showDialog(msg, opts={}){
  return new Promise(resolve=>{
    _dialogResolve = resolve;
    document.getElementById('dialogMsg').textContent = msg;
    const cancel = document.getElementById('dialogCancel');
    const ok = document.getElementById('dialogOk');
    const inputWrap = document.getElementById('dialogInput');
    const inputField = document.getElementById('dialogInputField');
    // Configure
    cancel.style.display = opts.alert ? 'none' : '';
    ok.textContent = opts.okText || 'OK';
    ok.className = 'dialog-ok' + (opts.green ? ' green' : '');
    cancel.textContent = opts.cancelText || 'Cancel';
    if(opts.input !== undefined){
      inputWrap.style.display='block';
      inputField.value = opts.input;
      setTimeout(()=>inputField.select(),100);
    } else {
      inputWrap.style.display='none';
    }
    document.getElementById('dialogModal').classList.add('show');
  });
}
function resolveDialog(ok){
  document.getElementById('dialogModal').classList.remove('show');
  if(_dialogResolve){
    const inputWrap = document.getElementById('dialogInput');
    if(ok && inputWrap.style.display==='block'){
      _dialogResolve(document.getElementById('dialogInputField').value);
    } else {
      _dialogResolve(ok);
    }
    _dialogResolve=null;
  }
}

// ===================== HELPERS =====================
function fmtWeight(w){ return w===0 ? 'BW' : w; }
function fmtSet(s){ return fmtWeight(s.weight)+'×'+s.reps; }
function calcVolume(exercises){
  return exercises.reduce((s,e)=>s+e.allSets.reduce((a,set)=>a+(set.weight>0?set.weight*set.reps:0),0),0);
}

// ===================== WEEKLY STATS =====================
function updateWeekStats(){
  const done = LS('iron_completed') || [];
  if(done.length===0){ document.getElementById('weekStats').style.display='none'; return; }
  const now = new Date();
  const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay()); startOfWeek.setHours(0,0,0,0);
  const thisWeek = done.filter(w=>new Date(w.date)>=startOfWeek);
  if(thisWeek.length===0){ document.getElementById('weekStats').style.display='none'; return; }
  const sets = thisWeek.reduce((s,w)=>s+(w.exercises||[]).reduce((a,e)=>a+(e.sets||e.allSets||[]).length,0),0);
  const vol = thisWeek.reduce((s,w)=>s+(w.volume||0),0);
  const el = document.getElementById('weekStats');
  el.style.display='block';
  el.innerHTML=`This week: <span class="num">${thisWeek.length}</span> session${thisWeek.length!==1?'s':''} · <span class="num">${sets}</span> sets · <span class="num">${vol.toLocaleString()}</span> lbs`;
}

// ===================== TRAINING PLAN =====================
const MUSCLE_GROUPS = {
  'Upper': {
    color: '#3b82f6',
    groups: ['Chest', 'Back', 'Shoulders', 'Biceps', 'Triceps', 'Core']
  },
  'Lower': {
    color: '#dc2626',
    groups: ['Quads', 'Hamstrings', 'Glutes', 'Calves', 'Core']
  },
  'Full Body': {
    color: '#8b5cf6',
    groups: ['Chest', 'Back', 'Shoulders', 'Quads', 'Hamstrings', 'Glutes', 'Biceps', 'Triceps', 'Core', 'Calves']
  }
};

let currentFocus = null; // 'Upper', 'Lower', or 'Full Body'
// planQueue removed — no longer used in muscle group flow

function showPlanView(){
  document.getElementById('planView').style.display='block';
  document.getElementById('pickerView').style.display='none';
  document.getElementById('exCard').style.display='none';
  document.getElementById('groupPrompt').classList.remove('show');
  currentFocus = null;
  updateWeekStats();

  const grid = document.getElementById('planGrid');
  grid.innerHTML='';

  // Show focus selection
  Object.entries(MUSCLE_GROUPS).forEach(([name, cfg])=>{
    const btn = document.createElement('button');
    btn.style.cssText=`width:100%;padding:16px;border-radius:14px;background:var(--s1);border:1px solid ${cfg.color};text-align:left;color:var(--text);display:flex;flex-direction:column;gap:4px`;
    btn.innerHTML=`
      <span style="font-size:18px;font-weight:700;color:${cfg.color}">${name}</span>
      <span style="font-size:12px;color:var(--dim)">${cfg.groups.join(' · ')}</span>`;
    btn.onclick=()=>showMuscleGroups(name);
    grid.appendChild(btn);
  });
}

function showMuscleGroups(focus){
  currentFocus = focus;
  W.focus = focus; // persist across page reload
  save();
  const cfg = MUSCLE_GROUPS[focus];
  if(!W.active) startWorkout();

  document.getElementById('planView').style.display='none';
  document.getElementById('exCard').style.display='none';
  document.getElementById('pickerView').style.display='block';

  // Update picker title to show focus and hide edit button
  document.querySelector('#pickerView .picker-title').textContent = focus.toUpperCase() + ' — SELECT MUSCLE GROUP';
  document.getElementById('editRecentBtn').style.display='none';
  const grid = document.getElementById('recentGrid');
  grid.innerHTML='';

  // Show muscle group pills
  cfg.groups.forEach(group=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='display:inline-block';
    const btn=document.createElement('button');
    btn.className='recent-btn';
    btn.style.cssText=`border-color:${cfg.color}44;color:${cfg.color}`;
    btn.textContent=group;
    btn.onclick=()=>filterByMuscleGroup(group);
    wrap.appendChild(btn);
    grid.appendChild(wrap);
  });

  // Show recent exercises for this focus below
  const focusRecent = recentEx.filter(name=>{
    const h = history[name.toLowerCase()];
    if(!h || !h.category) return false;
    const cat = h.category.toLowerCase();
    // Match if category is the focus name itself (e.g., "Upper") or a specific muscle group within this focus
    return cat === focus.toLowerCase() || cfg.groups.some(g=>cat.includes(g.toLowerCase()));
  });

  if(focusRecent.length>0){
    const sep = document.createElement('div');
    sep.style.cssText='width:100%;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:12px;margin-bottom:6px';
    sep.textContent='Recent '+focus+' Exercises';
    grid.appendChild(sep);

    focusRecent.forEach(name=>{
      const wrap=document.createElement('div');
      wrap.style.cssText='display:inline-block';
      const btn=document.createElement('button');
      btn.className='recent-btn';
      const h=history[name.toLowerCase()];

// ===================== PLATE MATH =====================
function calcWeight(s){
  s = s.trim().toLowerCase();
  // Direct number
  let m = s.match(/^(\d+\.?\d*)\s*(lbs?|pounds?)?$/);
  if(m) return {total:parseFloat(m[1]), desc:m[1]+' lbs'};
  // Dumbbell
  m = s.match(/(\d+\.?\d*)\s*(lb|pound)?\s*(dumbbe?lls?|dbs?)/);
  if(m) return {total:parseFloat(m[1]), desc:m[1]+' lb DBs', db:true};
  // Plate math
  const nums={a:1,one:1,two:2,three:3,four:4,five:5,six:6};
  const names={plate:45,quarter:25,dime:10,nickel:5};
  let per=0, found=false;
  const re=/(\w+)\s+(45|35|25|10|5|2\.5)s?|(\w+)\s+(plates?|quarters?|dimes?|nickels?)/gi;
  let x;
  while((x=re.exec(s))!==null){
    found=true;
    if(x[1]&&x[2]){per+=(nums[x[1]]||parseInt(x[1])||1)*parseFloat(x[2])}
    else if(x[3]&&x[4]){per+=(nums[x[3]]||parseInt(x[3])||1)*(names[x[4].replace(/s$/,'')]||0)}
  }
  if(found&&per>0){const t=45+per*2;return{total:t,desc:t+' lbs ('+s+')'}}
  if(s.includes('bar')||s==='bar')return{total:45,desc:'45 lbs (bar)'};
  return null;
}

function selectExercise(name, weightStr){
  if(W.cur){
    if(W.sets.length===0){
      // Active exercise with no logged sets — discard silently
      W.cur=null; W.sets=[]; W.setIdx=0;
    } else {
      finishExercise();
    }
  }

  const h = history[name.toLowerCase()];
  const hasHistory = h && h.sets && h.sets.length > 0;
  const lastW = hasHistory ? h.weight : '';
  const lastSets = hasHistory ? h.sets : [];

  W.cur = name;
  W.sets = [];
  W.setIdx = 0;
  W.targetSets = hasHistory ? h.sets.length : 3;

  document.getElementById('pickerView').style.display='none';
  const card = document.getElementById('exCard');
  card.style.display='block';
  document.getElementById('exName').textContent = name;
  document.getElementById('exLast').textContent = hasHistory ?
    'Last: '+h.desc+' × '+h.sets.join(', ')+' ('+h.date+')' : 'First time';

  // Build set rows
  const container = document.getElementById('setRows');
  container.innerHTML='';
  for(let i=0;i<W.targetSets;i++){
    const row = document.createElement('div');
    row.className = 'set-row' + (i===0?' current':'');
    row.id = 'setRow'+i;
    const sugW = lastSets.length>i && hasHistory ? h.weight : (lastW||'');
    const sugR = lastSets.length>i ? lastSets[i] : '';
    row.innerHTML=`
      <span class="set-label" id="sLbl${i}">Set ${i+1}</span>
      <input class="w-input" id="sW${i}" type="number" inputmode="decimal" placeholder="lbs" value="${sugW}" onfocus="this.select()">
      <span class="x-label">×</span>
      <input class="r-input" id="sR${i}" type="number" inputmode="numeric" placeholder="reps" value="${sugR}" onfocus="this.select()">
      <button class="set-check" id="sC${i}" onclick="logSet(${i})">✓</button>
      <button style="width:28px;height:28px;border-radius:6px;background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center" onclick="deleteSet(${i})">×</button>`;
    container.appendChild(row);
  }
  // Focus first empty field: weight first, then reps, then reps of set 1 for returning exercises
  setTimeout(()=>{
    const w0=document.getElementById('sW0');
    const r0=document.getElementById('sR0');
    if(w0&&!w0.value) w0.focus();
    else if(r0&&!r0.value) r0.focus();
    else if(r0) r0.focus(); // returning exercise — all pre-filled, focus reps so user can start logging
  },100);
  save();
}

function logSet(idx){
  // Guard: don't double-log an already-checked set
  const chk=document.getElementById('sC'+idx);
  if(chk && chk.classList.contains('checked')) return;

  const wEl=document.getElementById('sW'+idx);
  const rEl=document.getElementById('sR'+idx);
  const w=parseFloat(wEl.value);
  const r=parseInt(rEl.value);
  if(isNaN(w)||w<0||!r)return; // allow weight=0 for bodyweight exercises

  W.sets.push({weight:w, reps:r});
  W.setIdx=idx+1;

  // Mark done
  const row=document.getElementById('setRow'+idx);
  row.classList.remove('current');
  row.classList.add('done');
  document.getElementById('sLbl'+idx).classList.add('done-label');
  document.getElementById('sLbl'+idx).textContent='✓ Set '+(idx+1);
  document.getElementById('sC'+idx).classList.add('checked');
  wEl.readOnly=true; rEl.readOnly=true;
  wEl.style.opacity='.5'; rEl.style.opacity='.5';

  // Vibrate
  if(navigator.vibrate) navigator.vibrate(50);

  // Auto-fill next set weight
  if(idx+1 < W.targetSets){
    const nextW=document.getElementById('sW'+(idx+1));
    if(nextW&&!nextW.value) nextW.value=w;
    const nextRow=document.getElementById('setRow'+(idx+1));
    if(nextRow) nextRow.classList.add('current');
    setTimeout(()=>{
      const nextR=document.getElementById('sR'+(idx+1));
      if(nextR) nextR.focus();
    },100);
  }

  // Start rest timer (keep running even on last set — user may need rest before next exercise)
  startRest(restDuration);
  save();
}

function finishExercise(){
  if(!W.cur) return;
  if(W.sets.length===0){ showDialog('Log at least one set first.',{alert:true,okText:'OK'}); return; }
  const name=W.cur;
  const mainWeight = W.sets[0].weight;
  const reps = W.sets.map(s=>s.reps);
  const desc = mainWeight+' lbs';

  // Snapshot previous history for progressive overload comparison
  const prevH = (history[name.toLowerCase()] && history[name.toLowerCase()].sets) ?
    {weight:history[name.toLowerCase()].weight, sets:[...history[name.toLowerCase()].sets]} : null;

  W.exercises.push({name, weight:mainWeight, desc, sets:W.sets.map(s=>s.reps), allSets:W.sets, prev:prevH});

  // Save to history (preserve existing category)
  const existingCat = (history[name.toLowerCase()] && history[name.toLowerCase()].category) || '';
  history[name.toLowerCase()]={weight:mainWeight, desc, sets:reps, date:new Date().toISOString().split('T')[0], category:existingCat};
  SS('iron_history', history);

  // Update recent
  recentEx = [name, ...recentEx.filter(e=>e.toLowerCase()!==name.toLowerCase())].slice(0,8);
  SS('iron_recent', recentEx);

  W.cur=null; W.sets=[]; W.setIdx=0;
  document.getElementById('exCard').style.display='none';
  // Don't clear rest — user may want rest before starting next exercise
  updateLog();

  // Return to muscle group picker if we have a focus selected
  if(currentFocus){
    showMuscleGroups(currentFocus);
  } else {
    showPicker();
  }
  save();
}

function deleteSet(idx){
  if(W.targetSets<=1) return;
  W.targetSets--;
  const savedSets = [...W.sets]; // preserve logged sets
  if(idx < savedSets.length) savedSets.splice(idx,1);

  // Rebuild set rows manually (don't call selectExercise — it resets W.sets)
  const name = W.cur;
  const h = history[name.toLowerCase()];
  const hValid = h && h.sets && h.sets.length > 0;
  const container = document.getElementById('setRows');
  container.innerHTML='';

  W.sets = savedSets;
  W.setIdx = savedSets.length;

  for(let i=0;i<W.targetSets;i++){
    const row = document.createElement('div');
    row.className = 'set-row';
    row.id = 'setRow'+i;
    const isLogged = i < savedSets.length;
    const sugW = isLogged ? savedSets[i].weight : (hValid ? h.weight : '');
    const sugR = isLogged ? savedSets[i].reps : (hValid && h.sets[i] ? h.sets[i] : '');

      row.innerHTML=`

    } else {
      if(i === W.setIdx) row.classList.add('current');
      row.innerHTML=`
        <span class="set-label" id="sLbl${i}">Set ${i+1}</span>
        <input class="w-input" id="sW${i}" type="number" inputmode="decimal" placeholder="lbs" value="${sugW}" onfocus="this.select()">

// ===================== REST TIMER (from Strong) =====================
let restDuration = 90; // default 90 seconds
const restOptions = [60, 90, 120, 180];

function cycleRestTime(){
  const curIdx = restOptions.indexOf(restDuration);
  restDuration = restOptions[(curIdx+1)%restOptions.length];
  if(restInterval) startRest(restDuration); // restart with new duration
  else{
    const m=Math.floor(restDuration/60);
    const s=(restDuration%60).toString().padStart(2,'0');
    document.getElementById('restTime').textContent=m+':'+s;
  }
}

function startRest(secs){
  secs = secs || restDuration;
  clearRest();
  let rem=secs;
  const bar=document.getElementById('restBar');
  bar.classList.add('show');
  updateRestDisplay(rem);
  restInterval=setInterval(()=>{
    rem--;
    if(rem<=0){clearRest();notifyRestDone()}
    else updateRestDisplay(rem);
  },1000);
}
function clearRest(){
  if(restInterval)clearInterval(restInterval);
  restInterval=null;
  document.getElementById('restBar').classList.remove('show');
}
function updateRestDisplay(s){
  const m=Math.floor(s/60);
  const sec=(s%60).toString().padStart(2,'0');
  document.getElementById('restTime').textContent=m+':'+sec;
}

function notifyRestDone(){
  // Vibrate if supported (Android)
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  // Audio beep fallback (iOS — no vibration API)
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value=880; gain.gain.value=0.3;
    osc.start(); osc.stop(ctx.currentTime+0.15);
    setTimeout(()=>{
      const osc2=ctx.createOscillator();
      const gain2=ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value=1100; gain2.gain.value=0.3;
      osc2.start(); osc2.stop(ctx.currentTime+0.15);
    },200);
  }catch(e){}
}

// ===================== SUMMARY (from Hevy) =====================
function showSummary(){
  const dur=Math.floor((new Date()-W.start)/60000);
  const totalSets=W.exercises.reduce((s,e)=>s+e.sets.length,0);
  const totalVol=calcVolume(W.exercises);
  let html='';
  html+=`<div class="row"><span class="lbl">Duration</span><span class="val">${dur} min</span></div>`;
  html+=`<div class="row"><span class="lbl">Exercises</span><span class="val">${W.exercises.length}</span></div>`;
  html+=`<div class="row"><span class="lbl">Total Sets</span><span class="val">${totalSets}</span></div>`;
  html+=`<div class="row"><span class="lbl">Volume</span><span class="val">${totalVol.toLocaleString()} lbs</span></div>`;
  html+='<div style="height:12px"></div>';
  W.exercises.forEach(ex=>{
    const sStr=ex.allSets.map(s=>fmtSet(s)).join(', ');
    // Progressive overload comparison
    const prev=ex.prev;
    let badge='';
    if(prev && prev.sets){
      const prevVol=prev.weight * prev.sets.reduce((a,r)=>a+r,0);
      const curVol=ex.allSets.reduce((a,s)=>a+s.weight*s.reps,0);
      const wDiff=ex.weight-prev.weight;
      if(wDiff>0) badge=`<span style="color:var(--green);font-size:11px;font-weight:700"> ↑${wDiff}lbs</span>`;
      else if(wDiff<0) badge=`<span style="color:var(--red);font-size:11px;font-weight:700"> ↓${Math.abs(wDiff)}lbs</span>`;
      else {
        // Same weight — compare total reps
        const prevReps=prev.sets.reduce((a,r)=>a+r,0);
        const curReps=ex.sets.reduce((a,r)=>a+r,0);
        if(curReps>prevReps) badge=`<span style="color:var(--green);font-size:11px;font-weight:700"> +${curReps-prevReps}reps</span>`;
        else if(curReps<prevReps) badge=`<span style="color:var(--red);font-size:11px;font-weight:700"> -${prevReps-curReps}reps</span>`;
        else badge=`<span style="color:var(--dim);font-size:11px"> →same</span>`;
      }
    } else {
      badge=`<span style="color:var(--blue);font-size:11px"> NEW</span>`;
    }
    html+=`<div class="row"><span class="lbl">${ex.name}${badge}</span><span class="val">${sStr}</span></div>`;
  });
  document.getElementById('summaryBody').innerHTML=html;
  document.getElementById('summaryModal').classList.add('show');
}

function submitWorkout(){
  // Save completed workout (cap at 100)
  const startDate = W.start instanceof Date ? W.start : new Date(W.start);
  const dur=Math.floor((new Date()-startDate)/60000);
  const totalVol=calcVolume(W.exercises);
  let done=LS('iron_completed')||[];
  done.push({date:startDate.toISOString(),dur,exercises:W.exercises,volume:totalVol});
  if(done.length>100) done=done.slice(-100);
  SS('iron_completed',done);
  localStorage.removeItem('iron_active');

  // Email to Joe
  shareToJoe();

  // Clear everything
  document.getElementById('summaryModal').classList.remove('show');
  W={active:false,start:null,exercises:[],cur:null,sets:[],setIdx:0,targetSets:3};
  document.getElementById('logView').innerHTML='';
  document.getElementById('timer').textContent='00:00';
  clearRest();
  if(timerInt)clearInterval(timerInt);
  document.getElementById('bottomBar').innerHTML='';
  showPlanView();
}

function closeSummary(){
  // Go back to workout — don't save, don't clear
  document.getElementById('summaryModal').classList.remove('show');
}

// ===================== EDIT & DELETE =====================
let editIdx = -1;

function toggleLogItem(idx){
  const items = document.querySelectorAll('.log-item');
  items.forEach((item,i)=>{
    if(i===idx) item.classList.toggle('expanded');
    else item.classList.remove('expanded');
  });
}

function editExercise(idx){
  editIdx = idx;
  const ex = W.exercises[idx];
  document.getElementById('editTitle').textContent = 'Edit Exercise';
  const container = document.getElementById('editSets');
  container.innerHTML=`<div class="edit-set-row" style="border-bottom:2px solid var(--border);padding-bottom:12px;margin-bottom:4px">
    <span style="width:auto;color:var(--dim);font-size:12px">Name</span>
    <input type="text" id="eNameInput" value="${ex.name}" style="width:100%;flex:1;text-align:left;font-size:15px;padding:0 10px">
  </div>`;
  ex.allSets.forEach((s,i)=>{
    const row = document.createElement('div');
    row.className='edit-set-row';
    row.innerHTML=`
      <span>Set ${i+1}</span>
      <input type="number" inputmode="decimal" id="eW${i}" value="${s.weight}">
      <span class="x-label">×</span>
      <input type="number" inputmode="numeric" id="eR${i}" value="${s.reps}">`;
    container.appendChild(row);
  });
  document.getElementById('editModal').classList.add('show');
}

function saveEdit(){
  if(editIdx<0) return;
  const ex = W.exercises[editIdx];
  const oldName = ex.name;

  // Update name
  const newName = document.getElementById('eNameInput').value.trim();
  if(newName) ex.name = newName;

  // Update sets
  ex.allSets.forEach((s,i)=>{
    const w = parseFloat(document.getElementById('eW'+i).value);
    const r = parseInt(document.getElementById('eR'+i).value);
    if(!isNaN(w) && w>=0) s.weight=w;
    if(r) { s.reps=r; ex.sets[i]=r; }
  });
  ex.weight = ex.allSets[0].weight;
  ex.desc = ex.weight+' lbs';

  // Update history (remove old name if renamed)
  if(oldName.toLowerCase()!==ex.name.toLowerCase()){
    delete history[oldName.toLowerCase()];
    recentEx = recentEx.map(e=>e.toLowerCase()===oldName.toLowerCase()?ex.name:e);
    SS('iron_recent', recentEx);
  }
  const editCat = (history[ex.name.toLowerCase()] && history[ex.name.toLowerCase()].category) || '';
  history[ex.name.toLowerCase()]={weight:ex.weight, desc:ex.desc, sets:ex.sets, date:new Date().toISOString().split('T')[0], category:editCat};
  SS('iron_history', history);

  closeEdit();
  updateLog();
  save();
}

function closeEdit(){
  editIdx=-1;
  document.getElementById('editModal').classList.remove('show');
}

async function deleteExercise(idx){
  const ok = await showDialog('Delete '+W.exercises[idx].name+'?', {okText:'Delete'});
  if(!ok) return;
  W.exercises.splice(idx,1);
  updateLog();
  save();
}

function toggleEditRecent(){
  const picker = document.getElementById('pickerView');
  picker.classList.toggle('edit-mode');
  const btn = document.getElementById('editRecentBtn');
  btn.textContent = picker.classList.contains('edit-mode') ? 'Done' : 'Edit';
}

function deleteRecent(name){
  recentEx = recentEx.filter(e=>e.toLowerCase()!==name.toLowerCase());
  SS('iron_recent', recentEx);
  showPicker();
}

async function editRecent(oldName){
  const newName = await showDialog('Rename exercise:', {input:oldName, okText:'Rename', green:true});
  if(!newName || !newName.trim() || newName.trim()===oldName) return;
  const cleaned = newName.trim().replace(/\b\w/g,c=>c.toUpperCase());

  // Update recent list
  recentEx = recentEx.map(e=>e.toLowerCase()===oldName.toLowerCase()?cleaned:e);
  SS('iron_recent', recentEx);

  // Update history
  if(history[oldName.toLowerCase()]){
    history[cleaned.toLowerCase()] = history[oldName.toLowerCase()];
    delete history[oldName.toLowerCase()];
    SS('iron_history', history);
  }

  showPicker();
}

// ===================== WORKOUT HISTORY =====================
function showHistory(){
  const done=LS('iron_completed')||[];
  const body=document.getElementById('historyBody');
  if(done.length===0){body.innerHTML='<p style="color:var(--muted)">No completed workouts yet.</p>';document.getElementById('historyModal').classList.add('show');return}
  let html='';
  done.slice().reverse().slice(0,20).forEach(w=>{
    const d=new Date(w.date);
    const dateStr=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    html+=`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">`;
    html+=`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;font-size:14px">${dateStr}</span><span style="color:var(--dim);font-size:12px">${w.dur}min · ${w.volume?.toLocaleString()||'?'}lbs</span></div>`;
    (w.exercises||[]).forEach(ex=>{
      const sStr=(ex.allSets||[]).map(s=>(s.weight===0?'BW':s.weight)+'×'+s.reps).join(', ');
      html+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span style="color:var(--text)">${ex.name}</span><span style="color:var(--dim)">${sStr}</span></div>`;
    });
    html+=`</div>`;
  });
  body.innerHTML=html;
  document.getElementById('historyModal').classList.add('show');
}

// ===================== SHARE TO JOE =====================
async function shareToJoe(){
  const dur=Math.floor((new Date()-W.start)/60000);
  const totalVol=calcVolume(W.exercises);
  const totalSets=W.exercises.reduce((s,e)=>s+e.sets.length,0);
  const date=new Date().toISOString().split('T')[0];
  const day=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];

  let body=`IRON WORKOUT: ${date} (${day})\n`;
  body+=`Duration: ${dur} min | Sets: ${totalSets} | Volume: ${totalVol.toLocaleString()} lbs\n\n`;

  W.exercises.forEach(ex=>{
    const sStr=ex.allSets.map(s=>fmtSet(s)).join(', ');
    body+=`${ex.name}: ${sStr}\n`;
  });

  body+='\n--- Iron PWA ---';

  const title=`IRON: ${day} Workout ${date}`;

  // Web Share API (iOS Safari, Android)
  if(navigator.share){
    try{
      await navigator.share({title, text:body});
      return;
    }catch(e){} // user cancelled or not supported
  }
  // Clipboard fallback
  try{
    await navigator.clipboard.writeText(body);
    showDialog('Workout copied to clipboard! Paste it to Joe.',{alert:true,okText:'Got it',green:true});
  }catch(e){
    // Final fallback — select text
    showDialog(body,{alert:true,okText:'OK'});
  }
}

// ===================== DATA EXPORT =====================
function exportData(){
  const data={
    history: LS('iron_history')||{},
    recent: LS('iron_recent')||[],
    completed: LS('iron_completed')||[]
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='iron-workout-data-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ===================== TIMER =====================
let timerInt=null;
function startTimer(){
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!W.start)return;
    const s=Math.floor((new Date()-new Date(W.start))/1000);
    const m=Math.floor(s/60).toString().padStart(2,'0');
    const sec=(s%60).toString().padStart(2,'0');
    document.getElementById('timer').textContent=m+':'+sec;
  },1000);
}

// ===================== RESTORE UI =====================
function restoreUI(){
  startTimer();
  document.getElementById('planView').style.display='none';
  document.getElementById('bottomBar').innerHTML=`
    <button class="bot-btn next" onclick="if(currentFocus)showMuscleGroups(currentFocus);else showPicker()">+ Exercise</button>
    <button class="bot-btn finish" onclick="endWorkout()">Finish</button>
    <button style="position:absolute;top:-30px;right:16px;font-size:11px;color:var(--muted);background:none" onclick="discardWorkout()">Discard</button>`;
  updateLog();
  if(W.cur) restoreExerciseCard();
  else if(currentFocus) showMuscleGroups(currentFocus);
  else showPicker();
}

// Rebuild exercise card from saved state WITHOUT resetting W.sets/setIdx
function restoreExerciseCard(){
  const name = W.cur;
  const h = history[name.toLowerCase()];
  const hasHistory = h && h.sets && h.sets.length > 0;

  document.getElementById('pickerView').style.display='none';
  const card = document.getElementById('exCard');
  card.style.display='block';
  document.getElementById('exName').textContent = name;
  document.getElementById('exLast').textContent = hasHistory ?
    'Last: '+h.desc+' × '+h.sets.join(', ')+' ('+h.date+')' : 'First time';

  const container = document.getElementById('setRows');
  container.innerHTML='';
  for(let i=0;i<W.targetSets;i++){
    const row = document.createElement('div');
    row.className = 'set-row';
    row.id = 'setRow'+i;
    const isLogged = i < W.sets.length;

    if(isLogged){
      row.classList.add('done');
      row.innerHTML=`
        <span class="set-label done-label" id="sLbl${i}">✓ Set ${i+1}</span>
        <input class="w-input" id="sW${i}" type="number" inputmode="decimal" value="${W.sets[i].weight}" readonly style="opacity:.5">
        <span class="x-label">×</span>
        <input class="r-input" id="sR${i}" type="number" inputmode="numeric" value="${W.sets[i].reps}" readonly style="opacity:.5">
        <button class="set-check checked" id="sC${i}" onclick="logSet(${i})">✓</button>
        <button style="width:28px;height:28px;border-radius:6px;background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center" onclick="deleteSet(${i})">×</button>`;
    } else {
      if(i === W.setIdx) row.classList.add('current');
      const sugW = hasHistory ? h.weight : (W.sets.length>0 ? W.sets[W.sets.length-1].weight : '');
      const sugR = hasHistory && h.sets[i] ? h.sets[i] : '';
      row.innerHTML=`
        <span class="set-label" id="sLbl${i}">Set ${i+1}</span>
        <input class="w-input" id="sW${i}" type="number" inputmode="decimal" placeholder="lbs" value="${sugW}" onfocus="this.select()">
        <span class="x-label">×</span>
        <input class="r-input" id="sR${i}" type="number" inputmode="numeric" placeholder="reps" value="${sugR}" onfocus="this.select()">
        <button class="set-check" id="sC${i}" onclick="logSet(${i})">✓</button>
        <button style="width:28px;height:28px;border-radius:6px;background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center" onclick="deleteSet(${i})">×</button>`;
    }
    container.appendChild(row);
  }
}

// ===================== iOS AUDIO CONTEXT INIT =====================
// iOS requires user gesture to init AudioContext — do it on first tap
let audioCtxReady = false;
document.addEventListener('touchstart', function initAudio(){
  if(audioCtxReady) return;
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.001); // silent init
    audioCtxReady=true;
  }catch(e){}
}, {once:true});

// ===================== SERVICE WORKER =====================
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
